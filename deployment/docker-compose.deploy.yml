version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eru-postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - eru-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  app:
    image: ${DOCKERHUB_IMAGE:-your-dockerhub-user/eru:latest}
    container_name: eru-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    environment:
      DEPLOYED: "true"
      DB_NAME: ${DB_NAME}
      CONNECTION_STR: ${CONNECTION_STR}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8080:7070"

networks:
  backend:
    name: backend

volumes:
  eru-postgres-data:
